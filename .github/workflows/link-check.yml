name: Link Check

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    # Weekly check to catch stale external links.
    - cron: "0 13 * * 1"

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --config _config.yml,_config.ci.yml

      - name: Link check generated site
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --config .github/lychee.toml
            _site/**/*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify LinkedIn links (browser-like user agent)
        run: python3 scripts/check_linkedin_urls.py _site
