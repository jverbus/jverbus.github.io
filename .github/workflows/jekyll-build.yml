name: Jekyll Build

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Validate post social image metadata
        run: python3 scripts/check_post_og.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test interactive demos
        run: |
          node scripts/test_if_demo.js
          node scripts/test_orbit_demo.js
          node scripts/test_lux_demo.js

      - name: Build site
        run: bundle exec jekyll build

      - name: Validate generated site output
        run: python3 scripts/check_generated_site.py _site
