    description: "I built and open sourced this distributed Scala/Spark isolation-forest implementation for large-scale unsupervised anomaly detection at LinkedIn."

  - date: "Artifacts"
    title: "Maven Central: com.linkedin:isolation-forest"
    url: "https://repo.maven.apache.org/maven2/com/linkedin/isolation-forest/"
