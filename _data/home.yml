featured_work:
  - eyebrow: "Open Source"
    title: "Isolation Forest for large-scale anomaly detection"
    description: "Built and open sourced LinkedIn’s Spark/Scala isolation-forest library for unsupervised anomaly detection in production anti-abuse systems."
    url: "/open-source/"

  - eyebrow: "Research"
    title: "Detecting AI-generated faces in the wild"
    description: "Research and engineering work on identifying synthetic profile images and other signals of inauthentic behavior at scale."
    url: "/2024/08/15/finding-ai-generated-faces-in-the-wild/"

  - eyebrow: "Trust & Safety"
    title: "Deep learning for abusive behavior and platform defense"
    description: "Production-facing work on abuse detection, adversarial behavior, and sequence-based models for protecting real platforms at scale."
