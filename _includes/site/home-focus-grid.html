{% assign items = site.data.home.focus_areas %}
<section class="home-section" aria-labelledby="focus-areas-title">
  <div class="home-section-header">
    <p class="home-section-kicker">Focus areas</p>
    <h2 class="home-section-title" id="focus-areas-title">What I work on</h2>
  </div>

  <div class="home-grid home-focus-grid" role="list">
    {% for item in items %}
      <article class="home-card home-focus-card" role="listitem">
        <h3 class="home-card-title">{{ item.title }}</h3>
        <p class="home-card-description">{{ item.description }}</p>
      </article>
    {% endfor %}
  </div>
</section>
