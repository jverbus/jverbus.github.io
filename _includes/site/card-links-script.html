<script>
(function () {
  var cardSelector = ".post-list-item";
  var interactiveSelector = "a, button, input, select, textarea, summary, [role='button'], [role='link']";
  var cards = document.querySelectorAll(cardSelector);

  function hasSelectedText() {
    var selection = window.getSelection && window.getSelection();
    return selection && selection.toString().trim().length > 0;
  }

  function getActionLinks(card) {
    return Array.prototype.slice.call(card.querySelectorAll("a[href]"))
      .filter(function (link) {
        var href = link.getAttribute("href") || "";
        return href.trim().length > 0 && href.trim().charAt(0) !== "#";
      });
  }

  function resolvePrimaryLink(card) {
    var mode = (card.getAttribute("data-card-clickable") || "auto").toLowerCase();
    if (mode === "off") {
      return null;
    }

    var links = getActionLinks(card);
    if (!links.length) {
      return null;
    }

    if (mode === "on") {
      return links[0];
    }

    // auto mode: only make the whole card clickable when there is exactly one action link
    if (links.length !== 1) {
      return null;
    }

    return links[0];
  }

  function openPrimaryLink(link, event) {
    var href = link.href;
    if (!href || event.altKey) {
      return;
    }

    if (event.metaKey || event.ctrlKey || event.button === 1) {
      window.open(href, "_blank", "noopener");
      return;
    }

    if (event.shiftKey || link.target === "_blank") {
      window.open(href, "_blank", "noopener");
      return;
    }

    window.location.href = href;
  }

  cards.forEach(function (card) {
    var primaryLink = resolvePrimaryLink(card);
    if (!primaryLink) {
      card.classList.remove("card-clickable");
      return;
    }

    card.classList.add("card-clickable");

    function handleCardClick(event) {
      var target = event.target;
      if (event.defaultPrevented || hasSelectedText()) {
        return;
      }

      if (target && target.nodeType !== 1) {
        target = target.parentElement;
      }

      if (target && target.closest(interactiveSelector)) {
        return;
      }

      if (event.type === "click" && event.button !== 0) {
        return;
      }

      if (event.type === "auxclick" && event.button !== 1) {
        return;
      }

      openPrimaryLink(primaryLink, event);
    }

    card.addEventListener("click", handleCardClick);
    card.addEventListener("auxclick", handleCardClick);
  });
})();
</script>
