permalink: /:year/:month/:day/:title/

exclude:
  - ".rvmrc"
  - ".rbenv-version"
  - "README.md"
  - "Rakefile"
  - "Gemfile"
  - "Gemfile.lock"
  - ".bundle"
  - "vendor"
  - "scripts"
highlighter: rouge

# Site metadata
title: James Verbus
tagline:
default_og_image: /assets/images/social/2016-08-18-calibrating-the-lux-dark-matter-experiment-1200x630.jpg
default_og_image_width: 1200
default_og_image_height: 630
author:
  name: James Verbus
  email: james.verbus@gmail.com
  github: jverbus
  twitter: JamesVerbus

url: https://jverbus.github.io
baseurl: ""

plugins: ["jekyll-sitemap"]

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      og_image_width: 1200
      og_image_height: 630
