permalink: /:year/:month/:day/:title/

exclude:
  - ".rvmrc"
  - ".rbenv-version"
  - "README.md"
  - "AGENTS.md"
  - "CLAUDE.md"
  - "Rakefile"
  - "Gemfile"
  - "Gemfile.lock"
  - ".bundle"
  - "vendor"
  - "scripts"
highlighter: rouge

# Site metadata
title: James Verbus
tagline: "AI systems for messy, adversarial environments."
default_og_image: /assets/images/social/site-default-1200x630.png
default_og_image_width: 1200
default_og_image_height: 630
author:
  name: James Verbus
  email: james.verbus@gmail.com
  github: jverbus
  twitter: JamesVerbus

url: https://jverbus.github.io
baseurl: ""

plugins: ["jekyll-sitemap"]

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      og_image_width: 1200
      og_image_height: 630
  - scope:
      path: "assets/files"
    values:
      sitemap: false
  - scope:
      path: "googlec15fb936e51d8bcb.html"
    values:
      sitemap: false
